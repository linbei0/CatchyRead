<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CatchyRead 设置</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0f1220;
        --panel: rgba(17, 23, 42, 0.82);
        --panel-border: rgba(148, 163, 184, 0.22);
        --text: #eef2ff;
        --muted: #94a3b8;
        --accent: #60a5fa;
        --accent-strong: #818cf8;
        --danger: #f87171;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", "PingFang SC", sans-serif;
        background:
          radial-gradient(circle at top, rgba(96, 165, 250, 0.16), transparent 40%),
          linear-gradient(180deg, #020617, #0f172a 42%, #111827);
        color: var(--text);
      }

      main {
        max-width: 980px;
        margin: 0 auto;
        padding: 48px 24px 72px;
      }

      .hero {
        display: grid;
        gap: 12px;
        margin-bottom: 28px;
      }

      .eyebrow {
        color: var(--accent);
        font-size: 12px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(34px, 6vw, 56px);
        line-height: 0.96;
        max-width: 14ch;
      }

      .subtitle {
        max-width: 60ch;
        color: var(--muted);
        line-height: 1.6;
        margin: 0;
      }

      .grid {
        display: grid;
        gap: 24px;
        grid-template-columns: 1.1fr 0.9fr;
      }

      .panel {
        border: 1px solid var(--panel-border);
        background: var(--panel);
        backdrop-filter: blur(18px);
        border-radius: 24px;
        padding: 24px;
        box-shadow: 0 28px 80px rgba(15, 23, 42, 0.42);
      }

      .panel h2 {
        margin-top: 0;
      }

      .form-grid {
        display: grid;
        gap: 16px;
      }

      label {
        display: grid;
        gap: 8px;
        font-size: 14px;
        color: var(--muted);
      }

      input,
      select,
      textarea {
        width: 100%;
        padding: 12px 14px;
        border-radius: 14px;
        border: 1px solid rgba(148, 163, 184, 0.22);
        background: rgba(15, 23, 42, 0.78);
        color: var(--text);
        font: inherit;
      }

      textarea {
        min-height: 88px;
        resize: vertical;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 18px;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 12px 18px;
        font: inherit;
        cursor: pointer;
      }

      .primary {
        background: linear-gradient(135deg, var(--accent), var(--accent-strong));
        color: #0b1120;
        font-weight: 700;
      }

      .secondary {
        background: rgba(30, 41, 59, 0.86);
        color: var(--text);
      }

      .status {
        min-height: 24px;
        margin-top: 10px;
        color: var(--muted);
      }

      .status.error {
        color: var(--danger);
      }

      .list {
        display: grid;
        gap: 14px;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .list li {
        padding: 14px 16px;
        border-radius: 18px;
        background: rgba(15, 23, 42, 0.75);
        border: 1px solid rgba(96, 165, 250, 0.12);
      }

      @media (max-width: 820px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <span class="eyebrow">CatchyRead</span>
        <h1>把教程页变成会讲解的音频稿。</h1>
        <p class="subtitle">
          在这里配置你自己的 LLM 与 TTS 提供商。CatchyRead 只会把清洗后的最小必要正文发送到你指定的服务，不会静默回退。
        </p>
      </section>

      <section class="grid">
        <div class="panel">
          <h2>提供商设置</h2>
          <form id="settings-form" class="form-grid"></form>
          <div class="actions">
            <button class="primary" id="save-button" type="button">保存设置</button>
            <button class="secondary" id="reset-button" type="button">恢复默认</button>
          </div>
          <div id="status" class="status" role="status"></div>
        </div>

        <aside class="panel">
          <h2>V1 内建约束</h2>
          <ul class="list">
            <li>只处理当前网页，不做队列与书库。</li>
            <li>默认代码块摘要，不逐字朗读命令与长参数。</li>
            <li>原文模式与智能模式都需要显式启动，不后台偷跑。</li>
            <li>API Key 只保存在本地浏览器扩展存储中。</li>
          </ul>
        </aside>
      </section>
    </main>
    <script type="module" src="./options.js"></script>
  </body>
  </html>
