<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CatchyRead 设置</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #11131a;
        --bg-2: #0c1016;
        --panel: rgba(23, 27, 37, 0.96);
        --panel-soft: rgba(255, 255, 255, 0.03);
        --line: rgba(233, 221, 197, 0.12);
        --line-strong: rgba(233, 221, 197, 0.24);
        --text: #f7f3ea;
        --muted: #b2ab9b;
        --muted-2: #8a8691;
        --accent: #f6a95b;
        --accent-strong: #ffd59f;
        --success: #86d39e;
        --danger: #ff8b7b;
        --radius-xl: 28px;
        --radius-lg: 22px;
        --radius-md: 16px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, "Segoe UI", "PingFang SC", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(246, 169, 91, 0.16), transparent 30%),
          linear-gradient(180deg, var(--bg-2), var(--bg) 38%, #151924);
      }

      main {
        max-width: 1240px;
        margin: 0 auto;
        padding: 44px 24px 80px;
      }

      .hero {
        display: grid;
        gap: 10px;
        margin-bottom: 14px;
      }

      .eyebrow {
        color: var(--accent);
        font-size: 12px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(30px, 5vw, 52px);
        line-height: 0.92;
        letter-spacing: -0.04em;
        max-width: 11ch;
      }

      .shell {
        display: block;
      }

      .panel {
        border: 1px solid var(--line);
        background: var(--panel);
        border-radius: var(--radius-xl);
        padding: 18px;
        box-shadow: 0 28px 80px rgba(6, 10, 18, 0.42);
      }

      .panel-main {
        display: grid;
        gap: 18px;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: center;
        justify-content: space-between;
      }

      .toolbar-copy h2 {
        margin: 0 0 6px;
        font-size: 20px;
      }

      .toolbar-copy p {
        display: none;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      button {
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
        border-radius: 999px;
        padding: 12px 18px;
        font: inherit;
        cursor: pointer;
        transition: background 160ms ease, border-color 160ms ease;
      }

      button:hover {
        background: rgba(255, 255, 255, 0.07);
        border-color: var(--line-strong);
      }

      .primary {
        border: 0;
        color: #24160a;
        font-weight: 800;
        background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      }

      .secondary {
        background: rgba(255, 255, 255, 0.03);
      }

      .notice {
        display: grid;
        gap: 6px;
        padding: 12px 14px;
        border-radius: 18px;
        background: var(--panel-soft);
        border: 1px solid rgba(255, 255, 255, 0.06);
      }

      .notice[data-tone='success'] {
        border-color: rgba(134, 211, 158, 0.2);
        background: rgba(134, 211, 158, 0.08);
      }

      .notice[data-tone='danger'] {
        border-color: rgba(255, 139, 123, 0.2);
        background: rgba(255, 139, 123, 0.08);
      }

      .notice-title {
        font-weight: 700;
      }

      .notice-body,
      .notice-action,
      .notice details {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
      }

      .config-stack {
        display: grid;
        gap: 14px;
      }

      .config-section {
        display: grid;
        gap: 10px;
      }

      .config-section.emphasized {
        padding: 14px;
        border-radius: var(--radius-lg);
        background: linear-gradient(180deg, rgba(41, 32, 24, 0.72), rgba(18, 19, 25, 0.88));
        border: 1px solid rgba(246, 169, 91, 0.16);
      }

      .section-kicker {
        color: var(--accent);
        font-size: 12px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .section-copy h2 {
        margin: 4px 0 8px;
        font-size: 22px;
        line-height: 1.08;
      }

      .section-copy p {
        display: none;
      }

      .card-grid {
        display: grid;
        gap: 14px;
      }

      .config-card {
        display: grid;
        gap: 12px;
        padding: 16px;
        border-radius: var(--radius-lg);
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.07);
      }

      .secondary-card {
        background: rgba(255, 255, 255, 0.02);
      }

      .card-head {
        display: flex;
        gap: 12px;
        align-items: start;
        justify-content: space-between;
      }

      .card-head h3 {
        margin: 0 0 6px;
        font-size: 18px;
      }

      .card-head p {
        display: none;
      }

      .toggle-row,
      .subtle-toggle {
        display: inline-flex;
        gap: 10px;
        align-items: center;
        color: var(--muted);
        font-size: 13px;
        white-space: nowrap;
        justify-self: end;
      }

      .toggle-row input,
      .subtle-toggle input {
        width: 16px;
        height: 16px;
        margin: 0;
        flex: 0 0 auto;
      }

      .toggle-label {
        line-height: 1.2;
      }

      .field-grid {
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .field-grid.compact {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      label {
        display: grid;
        gap: 6px;
        color: var(--muted);
        font-size: 13px;
      }

      input,
      select,
      textarea {
        width: 100%;
        padding: 11px 13px;
        border-radius: var(--radius-md);
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.05);
        color: var(--text);
        font: inherit;
        color-scheme: dark;
      }

      option {
        background: #1b202b;
        color: var(--text);
      }

      textarea {
        min-height: 88px;
        resize: vertical;
      }

      .provider-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }

      .inline-feedback {
        color: var(--muted);
        font-size: 13px;
      }

      .inline-feedback.ok {
        color: var(--success);
      }

      .inline-feedback.error {
        color: var(--danger);
      }

      .advanced {
        border-top: 1px solid rgba(255, 255, 255, 0.06);
        padding-top: 12px;
      }

      .advanced summary {
        cursor: pointer;
        color: var(--text);
        font-weight: 600;
      }

      .advanced-grid {
        display: grid;
        gap: 12px;
        margin-top: 12px;
      }

      .panel-side { display: none; }

      .side-card {
        display: grid;
        gap: 10px;
        padding: 16px;
        border-radius: var(--radius-lg);
        border: 1px solid rgba(255, 255, 255, 0.07);
        background: rgba(255, 255, 255, 0.03);
      }

      .side-card h3 {
        margin: 0;
        font-size: 16px;
      }

      .check-list,
      .info-list {
        margin: 0;
        padding: 0;
        list-style: none;
        display: grid;
        gap: 10px;
      }

      .check-list li {
        display: flex;
        gap: 10px;
        align-items: start;
        color: var(--muted);
      }

      .check-list li.done {
        color: var(--text);
      }

      .muted {
        color: var(--muted-2);
      }

      @media (max-width: 980px) {
        .shell {
          grid-template-columns: 1fr;
        }

        .panel-side {
          position: static;
        }
      }

      @media (max-width: 720px) {
        main {
          padding-inline: 16px;
        }

        .field-grid,
        .field-grid.compact {
          grid-template-columns: 1fr;
        }

        .card-head,
        .toolbar {
          grid-template-columns: 1fr;
          display: grid;
        }

        .toggle-row,
        .subtle-toggle {
          justify-self: start;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <span class="eyebrow">CatchyRead</span>
        <h1>把网页调成值得长期打开的收听工具。</h1>
      </section>

      <section class="shell">
        <section class="panel panel-main">
          <div class="toolbar">
            <div class="toolbar-copy">
              <h2>声音与整理设置</h2>
            </div>
            <div class="actions">
              <button class="primary" id="save-button" type="button">保存设置</button>
              <button class="secondary" id="reset-button" type="button">恢复默认</button>
            </div>
          </div>

          <div id="status" class="notice" role="status" aria-live="polite"></div>

          <form id="settings-form" class="config-stack"></form>
        </section>
      </section>
    </main>
    <script type="module" src="./options.js"></script>
  </body>
  </html>
